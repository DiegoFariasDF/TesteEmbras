<h2>Gerenciamento de Publicidade</h2>

<button (click)="modalNova = true">Nova publicidade</button>

<br><br>

<table border="1" width="100%">
  <tr>
    <th>Foto</th>
    <th>Título</th>
    <th>Descrição</th>
    <th>Estados</th>
    <th>Status</th>
    <th>Ações</th>
  </tr>

  <tr *ngFor="let pub of publicidades">

    <td>
      <img 
        [src]="'http://localhost:8000/storage/' + pub.imagem" 
        width="80"
      >
    </td>

    <td>{{ pub.titulo }}</td>

    <td>{{ pub.descricao }}</td>

    <td>
      <span *ngFor="let est of pub.estados">
        {{ est.sigla }}
      </span>
    </td>

    <td>

      <span *ngIf="pub.dt_inicio <= hoje && pub.dt_fim >= hoje">
        Ativo
      </span>

      <span *ngIf="pub.dt_inicio > hoje">
        Publicará em {{ pub.dt_inicio }}
      </span>

      <span *ngIf="pub.dt_fim < hoje">
        Expirado
      </span>

    </td>

    <td>
      <button (click)="SelecionarPublicidade(pub)">Editar</button>
      <button (click)="Deletar(pub.id)">Excluir</button>
    </td>

  </tr>

</table>


<div *ngIf="modalEditar" class="modal-backdrop">

<div class="modal">

<h2>Editar Publicidade</h2>

<label>Título</label>
<input [(ngModel)]="publicidadeSelecionada.titulo">

<label>Descrição</label>
<textarea [(ngModel)]="publicidadeSelecionada.descricao"></textarea>

<label>Link</label>
<input [(ngModel)]="publicidadeSelecionada.botao_link">

<label>Título botão</label>
<input [(ngModel)]="publicidadeSelecionada.titulo_botao_link">

<label>Estados</label>

<select multiple [(ngModel)]="publicidadeSelecionada.estados[0].id">
  <option *ngFor="let est of estados" [value]="est.id">
    {{ est.descricao }} ({{ est.sigla }})
  </option>
</select>

<label>Data início</label>
<input type="date" [(ngModel)]="publicidadeSelecionada.dt_inicio">

<label>Data fim</label>
<input type="date" [(ngModel)]="publicidadeSelecionada.dt_fim">

<label>Imagem</label>
<input type="file" (change)="onFileSelected($event)">

<br><br>

<button (click)="Editar(
publicidadeSelecionada.id,
publicidadeSelecionada.titulo,
publicidadeSelecionada.descricao,
publicidadeSelecionada.botao_link,
publicidadeSelecionada.titulo_botao_link,
publicidadeSelecionada.estados[0].id,
publicidadeSelecionada.dt_inicio,
publicidadeSelecionada.dt_fim
)">
Salvar
</button>

<button (click)="FecharModal()">
Cancelar
</button>

</div>
</div>

<div *ngIf="modalNova" class="modal-backdrop">

<div class="modal">

<h2>Nova Publicidade</h2>

<label>Título</label>
<input #titulo>

<label>Descrição</label>
<textarea #descricao></textarea>

<label>Link</label>
<input #link>

<label>Título botão</label>
<input #tituloLink>

<label>Estado</label>
<select multiple #estado>
  <option *ngFor="let est of estados" [value]="est.id">
    {{ est.sigla }}
  </option>
</select>

<label>Data início</label>
<input type="date" #inicio>

<label>Data fim</label>
<input type="date" #fim>

<label>Imagem</label>
<input type="file" (change)="onFileSelected($event)">

<br><br>

<button (click)="Adicionar(
titulo.value,
descricao.value,
link.value,
tituloLink.value,
estado,
inicio.value,
fim.value
)">
Salvar
</button>

<button (click)="modalNova = false">
Cancelar
</button>

</div>
</div>
